# astrolabe — terminal as sepia ink on aged vellum
# Renaissance celestial chart: astrolabe rings, azimuth lines, ink-dot stars.
# Text presses into the parchment as dark sepia marks; background is warm cream.

# ── Shader ────────────────────────────────────────────────────────────────────
custom-shader = /Users/hlarsson/repos/palimpsest/astrolabe.glsl
custom-shader-animation = always

# ── Colors ───────────────────────────────────────────────────────────────────
# Background very dark — shader overrides with vellum; dark bg reads as 0 luma
# so it doesn't mask the parchment. Foreground bright so text reads as full ink.
background = 0e0805
foreground = f0ddb0
cursor-color = b06010
selection-background = 3a2010
selection-foreground  = f0ddb0

# 16-color palette — warm sepia register, readable as ink on parchment
# blacks
palette = 0=#0e0805
palette = 8=#3a2810
# reds (dried-blood red, rust)
palette = 1=#8a3018
palette = 9=#c05530
# greens (verdigris, oxidised copper)
palette = 2=#3a6030
palette = 10=#6a9858
# yellows (ochre, raw sienna)
palette = 3=#906020
palette = 11=#c89040
# blues (lapis lazuli, azurite)
palette = 4=#284870
palette = 12=#4878b0
# magentas (purple lake, carmine)
palette = 5=#683060
palette = 13=#a05890
# cyans (malachite glaze)
palette = 6=#306858
palette = 14=#58a888
# whites (vellum cream, bright highlight)
palette = 7=#c8b080
palette = 15=#f0ddb0

# ── Typography ────────────────────────────────────────────────────────────────
font-family = SF Mono
font-size = 15
font-thicken = true

# ── Window ────────────────────────────────────────────────────────────────────
window-theme = light
macos-titlebar-style = native
