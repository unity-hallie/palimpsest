# tattoo-light — fair Scandinavian skin in daylight, fresh and aged ink
# Skin preset: SKIN_SCANDINAVIAN in tattoo.glsl

# ── Shader ────────────────────────────────────────────────────────────────────
custom-shader = /Users/hlarsson/repos/palimpsest/tattoo.glsl
custom-shader-animation = always

# ── Colors — pale Nordic skin, dark ink ───────────────────────────────────────
background = e8ddd6   # warm parchment-skin
foreground = 1a1014   # near-black ink
cursor-color = 2a1a22
selection-background = c8b8b0
selection-foreground = 1a1014

# 16-color — muted, ink-stained
palette = 0=#1a1014
palette = 8=#3a2a30
palette = 1=#7a2830
palette = 9=#a84040
palette = 2=#2a5038
palette = 10=#407858
palette = 3=#6a5020
palette = 11=#907040
palette = 4=#2a3870
palette = 12=#4060a8
palette = 5=#5a2860
palette = 13=#8848a0
palette = 6=#285870
palette = 14=#4888a8
palette = 7=#987870
palette = 15=#c8b0a8

# ── Typography ────────────────────────────────────────────────────────────────
font-family = SF Mono
font-size = 15
font-thicken = false

# ── Window ────────────────────────────────────────────────────────────────────
window-theme = light
macos-titlebar-style = native
