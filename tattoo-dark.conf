# tattoo-dark — deep melanin skin, warm undertone, veins near-hidden, ink rich
# Skin preset: SKIN_DEEP in tattoo.glsl

# ── Shader ────────────────────────────────────────────────────────────────────
custom-shader = /Users/hlarsson/repos/palimpsest/tattoo.glsl
custom-shader-animation = always

# ── Colors — dim skin tones, faded blue-shifted ink ───────────────────────────
background = 1e1518   # very dark cool flesh shadow
foreground = c8b0b8   # faded aged ink, slightly lavender
cursor-color = a890a0
selection-background = 382830
selection-foreground = c8b0b8

# 16-color — bruise-adjacent, muted
palette = 0=#1e1518
palette = 8=#3a2830
palette = 1=#883040
palette = 9=#b85060
palette = 2=#285840
palette = 10=#488060
palette = 3=#706028
palette = 11=#988040
palette = 4=#304880
palette = 12=#5878b8
palette = 5=#604878
palette = 13=#9068b0
palette = 6=#306880
palette = 14=#5090b0
palette = 7=#907888
palette = 15=#c8b0b8

# ── Typography ────────────────────────────────────────────────────────────────
font-family = SF Mono
font-size = 15
font-thicken = true

# ── Window ────────────────────────────────────────────────────────────────────
window-theme = dark
macos-titlebar-style = native
