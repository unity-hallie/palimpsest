# mycelium — bioluminescent reaction-diffusion network
# Gray-Scott filament regime. Text nucleates growth.
# Deep ocean dark. Hyphae glow cyan. Bloom at the tips.

# ── Shader ────────────────────────────────────────────────────────────────────
custom-shader = /Users/hlarsson/repos/palimpsest/mycelium.glsl
custom-shader-animation = always

# ── Colors — abyssal palette ─────────────────────────────────────────────────
# Very dark background so the shader's ocean reads as true black
# Foreground bright cyan so text renders legibly through the water
background = 010508
foreground = 90e8d8
cursor-color = 40ffcc
selection-background = 003830
selection-foreground  = 90e8d8

# 16-color palette — deep sea register
# blacks (abyss, dark trench)
palette = 0=#010508
palette = 8=#0a1a20
# reds (bioluminescent red — rare, deep)
palette = 1=#882030
palette = 9=#c04050
# greens (chlorophyll deep, phytoplankton)
palette = 2=#106040
palette = 10=#28a870
# yellows (bioluminescent gold — dinoflagellate)
palette = 3=#806010
palette = 11=#c09820
# blues (deep water, abyssal pressure)
palette = 4=#103878
palette = 12=#2868c0
# magentas (deep-sea jellyfish, siphonophore)
palette = 5=#602870
palette = 13=#a050b8
# cyans (bioluminescent core — the thing itself)
palette = 6=#108880
palette = 14=#40e8d0
# whites (phosphorescence surface, bloom core)
palette = 7=#60a898
palette = 15=#c0f0e8

# ── Typography ────────────────────────────────────────────────────────────────
font-family = SF Mono
font-size = 15
font-thicken = true

# ── Window ────────────────────────────────────────────────────────────────────
window-theme = dark
macos-titlebar-style = native
