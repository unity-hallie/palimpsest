# ocean — rolling Gerstner swells, 10-minute day/night cycle, boid fish school
# Analytic waves, no compute for water — fish school uses boid sim.

# ── Shader ────────────────────────────────────────────────────────────────────
custom-shader = /Users/hlarsson/repos/palimpsest/ocean.glsl
custom-shader = /Users/hlarsson/repos/palimpsest/ocean.compute.msl
custom-shader-animation = always

# ── Colors — open ocean palette ───────────────────────────────────────────────
background = 010610
foreground = b8dff0
cursor-color = 60c8f0
selection-background = 0a1e30
selection-foreground = b8dff0

# 16-color — deep water register
palette = 0=#010610
palette = 8=#0a1828
palette = 1=#883838
palette = 9=#c05848
palette = 2=#207850
palette = 10=#38b070
palette = 3=#807830
palette = 11=#c0b040
palette = 4=#185890
palette = 12=#3080c0
palette = 5=#603878
palette = 13=#9858b0
palette = 6=#1878a0
palette = 14=#30a8d0
palette = 7=#78b8d0
palette = 15=#b8dff0

# ── Typography ────────────────────────────────────────────────────────────────
font-family = SF Mono
font-size = 15
font-thicken = true

# ── Window ────────────────────────────────────────────────────────────────────
window-theme = dark
macos-titlebar-style = native
