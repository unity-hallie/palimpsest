<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stele</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a2033; width: 100vw; height: 100vh; overflow: hidden; }
#container { position: relative; width: 100vw; height: 100vh; cursor: text; }
#glcanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
#input {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: text; z-index: 10;
    resize: none; border: none; outline: none;
    background: transparent; color: transparent;
    font-size: 15px; line-height: 22px;
    font-family: monospace; padding: 16px;
    caret-color: transparent;
    overflow-y: scroll;
}
#hint {
    position: absolute; bottom: 14px; right: 18px;
    color: rgba(160,185,220,0.25); font: 11px/1.5 monospace;
    pointer-events: none; z-index: 20; text-align: right;
}
</style>
</head>
<body>
<div id="container">
  <canvas id="glcanvas"></canvas>
  <textarea id="input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
  <div id="hint">stele · type to inscribe</div>
</div>
<script>
// ─── Text canvas ──────────────────────────────────────────────────────────────
const textCanvas = document.createElement('canvas');
const tx = textCanvas.getContext('2d');

const FONT_SIZE   = 15;
const LINE_HEIGHT = 22;
const PAD         = 16;
const FONT        = `${FONT_SIZE}px "JetBrains Mono","Fira Code","Cascadia Code","Consolas",monospace`;
tx.font = FONT;
const CHAR_W = tx.measureText('M').width;

const DEMO =
`


   STELE  ·  surface inscription  ·  layer 01

   ── INSCRIPTION ──────────────────────────────────────────────────────────────

   the surface receives all marks.
   the surface forgets nothing.

   each character pressed into the material of things.
   each word a weight that alters the topology.
   each blank line a clearing in the permanent record.



   ── READING ──────────────────────────────────────────────────────────────────

   text does not disappear.
   it becomes depth.
   it becomes relief.
   it becomes the stone beneath the stone.



   ── NOTE ─────────────────────────────────────────────────────────────────────

   press your language into the substrate.
   the oblique light will find what you leave here.


`;

const input = document.getElementById('input');
input.value = DEMO;

function drawText() {
    const W = textCanvas.width, H = textCanvas.height;
    tx.fillStyle = '#000000';
    tx.fillRect(0, 0, W, H);
    tx.font = FONT;
    tx.fillStyle = '#ffffff';
    const cols  = Math.floor((W - PAD * 2) / CHAR_W);
    const lines = input.value.split('\n');
    let y = PAD + FONT_SIZE - input.scrollTop;
    for (let li = 0; li < lines.length; li++) {
        let line = lines[li];
        while (line.length > cols) {
            tx.fillText(line.slice(0, cols), PAD, y);
            line = line.slice(cols);
            y += LINE_HEIGHT;
        }
        tx.fillText(line, PAD, y);
        y += LINE_HEIGHT;
        if (y > H + LINE_HEIGHT) break;
    }
}

function uploadText() {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, textCanvas);
}

// ─── WebGL ────────────────────────────────────────────────────────────────────
const glCanvas = document.getElementById('glcanvas');
const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');

const VS = `attribute vec2 aPos; void main() { gl_Position = vec4(aPos,0.0,1.0); }`;

const FS = `
precision highp float;
uniform sampler2D iChannel0;
uniform vec2      iResolution;
uniform float     iTime;
uniform float     iScrollY;

float hash(vec2 p) { return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float noise(vec2 p) {
    vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
    return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
               mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p) {
    return noise(p)                        * 0.500
         + noise(p*2.1+vec2(1.7,9.2))    * 0.250
         + noise(p*4.3+vec2(8.3,2.8))    * 0.125
         + noise(p*8.7+vec2(3.1,7.4))    * 0.0625;
}

// ── Wide blur → slab-shaped regions from text density ────────────────────────
// r = 0.014 (~27px) creates blocks that span lines but separate paragraphs.
float slabSample(vec2 uv) {
    const float r = 0.014;
    float h  = texture2D(iChannel0,uv+vec2(-r,-r)).r * 0.0625;
           h += texture2D(iChannel0,uv+vec2( 0,-r)).r * 0.1250;
           h += texture2D(iChannel0,uv+vec2( r,-r)).r * 0.0625;
           h += texture2D(iChannel0,uv+vec2(-r, 0)).r * 0.1250;
           h += texture2D(iChannel0,uv            ).r * 0.2500;
           h += texture2D(iChannel0,uv+vec2( r, 0)).r * 0.1250;
           h += texture2D(iChannel0,uv+vec2(-r, r)).r * 0.0625;
           h += texture2D(iChannel0,uv+vec2( 0, r)).r * 0.1250;
           h += texture2D(iChannel0,uv+vec2( r, r)).r * 0.0625;
    return h;
}
// Remap: flat top inside slab, steep transition at edges
float slabRemap(float raw) { return smoothstep(0.028, 0.190, raw); }

// ── Tight blur → crisp character shapes for paint mask ───────────────────────
float charSample(vec2 uv) {
    const float r = 0.0015;
    float h  = texture2D(iChannel0,uv+vec2(-r,-r)).r * 0.0625;
           h += texture2D(iChannel0,uv+vec2( 0,-r)).r * 0.1250;
           h += texture2D(iChannel0,uv+vec2( r,-r)).r * 0.0625;
           h += texture2D(iChannel0,uv+vec2(-r, 0)).r * 0.1250;
           h += texture2D(iChannel0,uv            ).r * 0.2500;
           h += texture2D(iChannel0,uv+vec2( r, 0)).r * 0.1250;
           h += texture2D(iChannel0,uv+vec2(-r, r)).r * 0.0625;
           h += texture2D(iChannel0,uv+vec2( 0, r)).r * 0.1250;
           h += texture2D(iChannel0,uv+vec2( r, r)).r * 0.0625;
    return h;
}

void main() {
    vec2  uv = gl_FragCoord.xy / iResolution.xy;
    float ar = iResolution.x / iResolution.y;

    // ── Slab height and normal ─────────────────────────────────────────────────
    float rawSlab = slabSample(uv);
    float slab    = slabRemap(rawSlab);

    // Normal from gradient of the REMAPPED slab field.
    // Only slab edges get non-zero normals (flat top = flat normal = undisturbed light).
    const float eps = 0.0026;
    vec3 N = normalize(vec3(
        (slabRemap(slabSample(uv-vec2(eps,0.0))) - slabRemap(slabSample(uv+vec2(eps,0.0)))) * 4.20 * ar,
        (slabRemap(slabSample(uv-vec2(0.0,eps))) - slabRemap(slabSample(uv+vec2(0.0,eps)))) * 4.20,
        1.0
    ));

    // ── Paint mask from tight character detail ─────────────────────────────────
    float charH = charSample(uv);
    // Paint applies where there are characters; softer slab multiplication ensures
    // paint doesn't bleed outside the stone block area.
    float paint = smoothstep(0.16, 0.65, charH) * smoothstep(0.15, 0.60, slab);

    // ── Light: warm oblique key, very slow drift (~12 min) ────────────────────
    float a   = iTime * 0.0087;
    vec3  L   = normalize(vec3(cos(a)*0.65+0.12, sin(a*0.61)*0.08+0.50, 0.68));
    float diff = max(dot(N, L), 0.0);

    vec3  V    = vec3(0.0, 0.0, 1.0);
    vec3  H    = normalize(L + V);
    // Spec: present on stone surface, suppressed under paint (matte pigment)
    float spec = pow(max(dot(N,H),0.0), 42.0) * 0.44 * (1.0 - paint * 0.90);

    // ── Marble UV tracks scroll so the slab reveals continuous stone ──────────
    vec2 mp = vec2(uv.x * ar, uv.y + iScrollY / iResolution.y);

    // ── Marble veins: domain-warped fbm, three scales ─────────────────────────
    vec2 q  = vec2(fbm(mp*1.20+vec2(0.00,0.00)), fbm(mp*1.20+vec2(5.21,1.33)));
    vec2 q2 = vec2(fbm(mp*0.85+q*1.50+vec2(2.80,0.63)),
                   fbm(mp*0.85+q*1.50+vec2(0.41,3.92)));
    float vein1 = 1.0 - smoothstep(0.0, 0.062, abs(fbm(mp*1.50+q2*2.00)    - 0.500));
    float vein2 = 1.0 - smoothstep(0.0, 0.036, abs(fbm(mp*2.70+q*0.80+vec2(4.13,7.28)) - 0.482));
    float vein3 = 1.0 - smoothstep(0.0, 0.020, abs(fbm(mp*5.10+vec2(1.09,3.74))  - 0.504));
    float veinMask = clamp(vein1*0.72 + vein2*0.44 + vein3*0.18, 0.0, 1.0);

    // ── Granite grain ─────────────────────────────────────────────────────────
    vec2  gp  = uv * vec2(ar, 1.0);
    float grn = (noise(gp*115.0)*0.54 + noise(gp*253.0+vec2(3.7,1.4))*0.30
               + noise(gp*531.0+vec2(9.1,5.8))*0.16 - 0.54) * 0.038;

    // ── Color layers ──────────────────────────────────────────────────────────
    // Deep background: very dark blue-slate
    vec3 bgCol   = vec3(0.165, 0.200, 0.295) + grn;
    // Raised slab surface: medium blue-grey (same stone, higher elevation)
    vec3 slabCol = vec3(0.262, 0.318, 0.448) + grn;
    // Painted rune: ivory — warm, archaeological, high contrast on blue stone
    vec3 runeCol = vec3(0.840, 0.818, 0.768);
    // Vein: lighter cool grey-blue running through both
    vec3 veinCol = vec3(0.510, 0.560, 0.655);

    // Veins run continuously through the whole slab (same stone, just raised)
    bgCol   = mix(bgCol,   veinCol,                  veinMask * 0.54);
    slabCol = mix(slabCol, veinCol+vec3(0.06,0.05,0.03), veinMask * 0.48);

    // Blend: deep wall → raised slab → painted inscription
    vec3 base = mix(bgCol, slabCol, slab);
    base = mix(base, runeCol, paint);

    // ── Lighting ──────────────────────────────────────────────────────────────
    vec3 ambCol = vec3(0.448, 0.505, 0.660);   // cool blue fill
    vec3 keyCol = vec3(0.988, 0.960, 0.895);   // warm white key

    // Contact shadow: background darkens in the penumbra just outside the slab.
    // rawSlab is high near the slab edge, slab flips to 0 in the background.
    float shadow = 1.0 - clamp(rawSlab * (1.0 - slab) * 4.5, 0.0, 1.0) * 0.28;

    vec3 col = base * (ambCol * 0.52 + keyCol * diff * 0.48) * shadow;
    col += keyCol * spec;

    gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}
`;

// ─── Compile & link ───────────────────────────────────────────────────────────
function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        console.error(gl.getShaderInfoLog(s));
    return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

const uRes     = gl.getUniformLocation(prog, 'iResolution');
const uTime    = gl.getUniformLocation(prog, 'iTime');
const uChan    = gl.getUniformLocation(prog, 'iChannel0');
const uScrollY = gl.getUniformLocation(prog, 'iScrollY');

function resize() {
    const W = window.innerWidth, H = window.innerHeight;
    glCanvas.width  = W; glCanvas.height = H;
    textCanvas.width = W; textCanvas.height = H;
    gl.viewport(0, 0, W, H);
    drawText(); uploadText();
}
window.addEventListener('resize', resize);
resize();

input.addEventListener('input',  () => { drawText(); uploadText(); });
input.addEventListener('scroll', () => { drawText(); uploadText(); });

const t0 = performance.now();
function frame() {
    const t = (performance.now() - t0) * 0.001;
    gl.uniform2f(uRes, glCanvas.width, glCanvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform1f(uScrollY, input.scrollTop);
    gl.uniform1i(uChan, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
