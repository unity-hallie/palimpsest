# ripple-dark — viscoelastic fluid with Beer-Lambert depth + 1989 wireframe corridor
# Deep navy void, dusty neon teal text. Typing creates neon blooms through liquid.
# Corridor scrolls in background — dim wireframe hallway with segment-based turns.

# ── Shader ────────────────────────────────────────────────────────────────────
custom-shader = /Users/hlarsson/repos/palimpsest/ripple.glsl
custom-shader-animation = always

# ── Colors ───────────────────────────────────────────────────────────────────
# Background very dark — shader owns the depth and colour, not the terminal bg
background = 06081a
foreground = 72d8c0
cursor-color = 00e4c8
selection-background = 0e1a2e
selection-foreground = b8f0e0

# 16-color palette — dusty neon, easy on the eyes over long sessions
# blacks / dark grays
palette = 0=#06081a
palette = 8=#141e30
# reds (desaturated coral-rose)
palette = 1=#b84858
palette = 9=#d06070
# greens (electric teal-green)
palette = 2=#28b090
palette = 10=#40c8a8
# yellows (amber — not white-yellow)
palette = 3=#b88840
palette = 11=#d0a058
# blues (steel-electric blue)
palette = 4=#3878b8
palette = 12=#5098d8
# magentas (muted violet)
palette = 5=#8848b8
palette = 13=#a860d0
# cyans (signature dusty-neon cyan)
palette = 6=#20b0c8
palette = 14=#38c8e0
# whites (cool blue-white, not stark)
palette = 7=#72d8c0
palette = 15=#b8f0e0

# ── Typography ────────────────────────────────────────────────────────────────
font-family = SF Mono
font-size = 15
font-thicken = true

# ── Window ────────────────────────────────────────────────────────────────────
window-theme = dark
macos-titlebar-style = native
